name: Release
on:
  push:
    tags: ['v*']

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: uhoh
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: uhoh
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: uhoh
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: uhoh
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: uhoh.exe
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: uhoh.exe

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Compute BLAKE3 hash
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          b3sum ${{ matrix.artifact }} > ${{ matrix.artifact }}.blake3
      - name: Rename artifact
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          cp ${{ matrix.artifact }} uhoh-${{ matrix.target }}$([[ "${{ matrix.artifact }}" == *.exe ]] && echo ".exe" || echo "")
          cp ${{ matrix.artifact }}.blake3 uhoh-${{ matrix.target }}.blake3
      # TODO: Sign the binary with Ed25519 and publish .sig file
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            target/${{ matrix.target }}/release/uhoh-${{ matrix.target }}*
