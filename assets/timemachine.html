<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>uhoh - Time Machine</title>
  <style>
    :root {
      --bg: #0b1216;
      --panel: #122129;
      --panel-2: #17313d;
      --ink: #e5f5fb;
      --muted: #8db0bf;
      --accent: #5bd3ff;
      --accent-2: #ffd166;
      --danger: #ff6b6b;
      --ok: #77dd77;
      --mono: "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      --ui: "Avenir Next", "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 10% 10%, rgba(91, 211, 255, 0.15), transparent 50%),
        radial-gradient(circle at 90% 90%, rgba(255, 209, 102, 0.12), transparent 45%),
        var(--bg);
      color: var(--ink);
      font-family: var(--ui);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-rows: 48px 1fr 220px;
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 12px;
      border-bottom: 1px solid #20414f;
      background: rgba(18, 33, 41, 0.9);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
      font-size: 13px;
    }

    button, select, input {
      background: var(--panel-2);
      color: var(--ink);
      border: 1px solid #2d5160;
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-danger { border-color: #6a2f2f; color: #ffd8d8; }
    .btn-primary { border-color: #2e6b82; }

    #workspace {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 0;
    }

    #tree {
      border-right: 1px solid #20414f;
      background: rgba(18, 33, 41, 0.7);
      overflow: auto;
      padding: 8px;
      font-size: 12px;
    }

    #content {
      min-height: 0;
      overflow: auto;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.5;
      user-select: text;
      white-space: pre-wrap;
    }

    .row {
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 2px;
    }

    .row:hover { background: rgba(91, 211, 255, 0.12); }
    .row.active { background: rgba(91, 211, 255, 0.2); }
    .row small { color: var(--muted); }

    #timeline {
      border-top: 1px solid #20414f;
      background: rgba(18, 33, 41, 0.85);
      overflow: auto;
      padding: 8px;
      font-size: 12px;
    }

    .event {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-right: 8px;
      margin-bottom: 8px;
      background: rgba(23, 49, 61, 0.8);
      border: 1px solid #2a5d71;
      padding: 6px 8px;
      border-radius: 999px;
      cursor: pointer;
    }

    .event.active { border-color: var(--accent); box-shadow: 0 0 0 1px rgba(91, 211, 255, 0.3); }
    .muted { color: var(--muted); }
    .danger { color: var(--danger); }
    .ok { color: var(--ok); }
    .hl { background: rgba(255, 209, 102, 0.2); }
  </style>
</head>
<body>
  <header>
    <div class="logo">uhoh</div>
    <select id="projectSelect"></select>
    <button id="refreshBtn" class="btn-primary">Refresh</button>
    <button id="snapshotBtn" class="btn-primary">Snapshot</button>
    <button id="restoreBtn" class="btn-danger">Restore</button>
    <input id="searchInput" placeholder="Search snapshots" />
    <span id="status" class="muted">Ready</span>
  </header>

  <section id="workspace">
    <aside id="tree"></aside>
    <main id="content">Select a file to inspect changes</main>
  </section>

  <section id="timeline"></section>

  <script>
    const API = '/api/v1';
    const state = {
      projects: [],
      project: null,
      snapshots: [],
      snapshot: null,
      previous: null,
      files: [],
      selectedPath: null,
    };

    const statusEl = document.getElementById('status');

    function setStatus(text, cls = 'muted') {
      statusEl.className = cls;
      statusEl.textContent = text;
    }

    function authHeaders(base = {}) {
      const token = window.localStorage.getItem('uhoh_token') || '';
      const headers = Object.assign({}, base);
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      return headers;
    }

    function withAuth(retryFn) {
      return retryFn().catch(async (error) => {
        if (!String(error.message || '').includes('401')) {
          throw error;
        }
        const token = prompt('Bearer token from ~/.uhoh/server.token');
        if (!token) {
          throw error;
        }
        window.localStorage.setItem('uhoh_token', token.trim());
        return retryFn();
      });
    }

    async function api(path, options = {}) {
      const headers = authHeaders(options.headers || {});
      const res = await fetch(path, Object.assign({}, options, { headers }));
      if (!res.ok) {
        const text = await res.text();
        throw new Error(text || `Request failed: ${res.status}`);
      }
      const contentType = res.headers.get('content-type') || '';
      if (contentType.includes('application/json')) {
        return res.json();
      }
      return res.text();
    }

    async function init() {
      bindEvents();
      await loadProjects();
      connectWs();
    }

    function bindEvents() {
      document.getElementById('refreshBtn').addEventListener('click', refreshAll);
      document.getElementById('projectSelect').addEventListener('change', onProjectChange);
      document.getElementById('snapshotBtn').addEventListener('click', createSnapshot);
      document.getElementById('restoreBtn').addEventListener('click', restoreSnapshot);
      document.getElementById('searchInput').addEventListener('input', onSearch);
    }

    async function loadProjects() {
      setStatus('Loading projects');
      const data = await api(`${API}/projects`);
      state.projects = data.projects || [];
      const select = document.getElementById('projectSelect');
      select.innerHTML = '';
      state.projects.forEach((project, index) => {
        const opt = document.createElement('option');
        opt.value = project.project_hash;
        opt.textContent = project.name || project.current_path;
        if (index === 0) opt.selected = true;
        select.appendChild(opt);
      });
      if (state.projects.length > 0) {
        state.project = state.projects[0];
        await loadSnapshots();
      }
      setStatus('Ready', 'ok');
    }

    async function onProjectChange(e) {
      const hash = e.target.value;
      state.project = state.projects.find(p => p.project_hash === hash) || null;
      await loadSnapshots();
    }

    async function loadSnapshots() {
      if (!state.project) return;
      setStatus('Loading snapshots');
      const data = await api(`${API}/projects/${state.project.project_hash}/snapshots?limit=200`);
      state.snapshots = data.snapshots || [];
      state.snapshot = state.snapshots[0] || null;
      state.previous = state.snapshots[1] || null;
      renderTimeline();
      await loadFiles();
      setStatus(`Loaded ${state.snapshots.length} snapshots`, 'ok');
    }

    async function loadFiles() {
      if (!state.project || !state.snapshot) return;
      const data = await api(`${API}/projects/${state.project.project_hash}/snapshots/${state.snapshot.id}/files`);
      state.files = data.flat_files || [];
      renderTree();
      if (state.files.length === 0) {
        document.getElementById('content').textContent = 'No files in this snapshot';
      }
    }

    function renderTree() {
      const tree = document.getElementById('tree');
      tree.innerHTML = '';
      const search = document.getElementById('searchInput').value.toLowerCase().trim();
      const files = state.files.filter(f => !search || f.path.toLowerCase().includes(search));
      files.forEach(file => {
        const row = document.createElement('div');
        row.className = 'row' + (state.selectedPath === file.path ? ' active' : '');
        row.innerHTML = `<span>📄</span><span>${escapeHtml(file.path)}</span><small>${file.size}b</small>`;
        row.onclick = () => selectFile(file.path);
        tree.appendChild(row);
      });
    }

    async function selectFile(path) {
      state.selectedPath = path;
      renderTree();
      await renderDiff(path);
    }

    async function renderDiff(path) {
      if (!state.project || !state.snapshot) return;
      const params = new URLSearchParams();
      params.set('file', path);
      if (state.previous) params.set('against', state.previous.id);
      const data = await api(`${API}/projects/${state.project.project_hash}/snapshots/${state.snapshot.id}/diff?${params.toString()}`);
      const diffs = data.diffs || [];
      if (diffs.length === 0) {
        document.getElementById('content').textContent = 'No diff for selected file';
        return;
      }

      let out = '';
      diffs.forEach(diff => {
        if (diff.binary) {
          out += `binary file: ${diff.path}\n`;
          return;
        }
        if (diff.too_large) {
          out += `file too large: ${diff.path}\n`;
          return;
        }
        (diff.hunks || []).forEach(hunk => {
          (hunk.lines || []).forEach(line => {
            const prefix = line.change_type === 'add' ? '+' : line.change_type === 'remove' ? '-' : ' ';
            const text = line.content || '';
            out += `${prefix}${text}\n`;
          });
        });
      });
      document.getElementById('content').textContent = out || 'No content';
    }

    function renderTimeline() {
      const root = document.getElementById('timeline');
      root.innerHTML = '';
      state.snapshots.forEach((snapshot, index) => {
        const node = document.createElement('div');
        node.className = 'event' + (state.snapshot && state.snapshot.id === snapshot.id ? ' active' : '');
        const time = new Date(snapshot.timestamp).toLocaleTimeString();
        node.innerHTML = `<strong>${index + 1}</strong><span>${snapshot.trigger}</span><span class="muted">${time}</span>`;
        node.onclick = async () => {
          state.snapshot = snapshot;
          state.previous = state.snapshots[index + 1] || null;
          state.selectedPath = null;
          renderTimeline();
          await loadFiles();
        };
        root.appendChild(node);
      });
    }

    async function createSnapshot() {
      if (!state.project) return;
      const message = prompt('Snapshot message', 'Manual snapshot');
      if (message === null) return;
      setStatus('Creating snapshot');
      await withAuth(() => api(`${API}/projects/${state.project.project_hash}/snapshots`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message }),
      }));
      await loadSnapshots();
      setStatus('Snapshot created', 'ok');
    }

    async function restoreSnapshot() {
      if (!state.project || !state.snapshot) return;
      const ok = confirm(`Restore snapshot ${state.snapshot.id}`);
      if (!ok) return;
      setStatus('Running dry run');
      await withAuth(() => api(`${API}/projects/${state.project.project_hash}/restore/${state.snapshot.id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dry_run: true }),
      }));

      const really = confirm('Dry run complete. Apply restore');
      if (!really) {
        setStatus('Restore canceled');
        return;
      }

      setStatus('Restoring snapshot', 'danger');
      await withAuth(() => api(`${API}/projects/${state.project.project_hash}/restore/${state.snapshot.id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dry_run: false, confirm: true }),
      }));
      setStatus('Restore complete', 'ok');
      await loadSnapshots();
    }

    async function onSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) {
        renderTree();
        return;
      }
      if (!state.project) return;
      if (query.startsWith('#')) {
        const q = query.slice(1);
        const data = await api(`${API}/search?q=${encodeURIComponent(q)}&project=${state.project.project_hash}`);
        const tree = document.getElementById('tree');
        tree.innerHTML = '';
        (data.results || []).forEach(result => {
          const row = document.createElement('div');
          row.className = 'row';
          row.innerHTML = `<span>📸</span><span>${escapeHtml(result.snapshot_id)}</span><small>${escapeHtml(result.match_context || '')}</small>`;
          row.onclick = () => {
            const snap = state.snapshots.find(s => s.id === result.snapshot_id);
            if (snap) {
              state.snapshot = snap;
              state.previous = state.snapshots[state.snapshots.indexOf(snap) + 1] || null;
              renderTimeline();
              loadFiles();
            }
          };
          tree.appendChild(row);
        });
        return;
      }
      renderTree();
    }

    async function refreshAll() {
      await loadSnapshots();
      setStatus('Refreshed', 'ok');
    }

    function connectWs() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${proto}//${location.host}/ws`);
      ws.onmessage = async (event) => {
        let data;
        try {
          data = JSON.parse(event.data);
        } catch (_) {
          return;
        }
        if (data.type === 'snapshot_created' && state.project && data.project_hash === state.project.project_hash) {
          setStatus('New snapshot created', 'ok');
          await loadSnapshots();
        }
      };
      ws.onclose = () => setTimeout(connectWs, 5000);
      ws.onerror = () => ws.close();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text || '';
      return div.innerHTML;
    }

    init().catch((e) => {
      console.error(e);
      setStatus(`Init failed: ${e.message}`, 'danger');
    });
  </script>
</body>
</html>
